name: AI Release and Publish

on:
    workflow_dispatch:
        inputs:
            instructions:
                description:
                    "Optional extra instructions for the AI release agent"
                required: false
                type: string

permissions:
    contents: write
    id-token: write
    issues: read

jobs:
    ai-release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: "24.x"
                  registry-url: "https://registry.npmjs.org"

            - name: Install Gemini CLI
              run: npm install -g @google/gemini-cli

            - name: Phase 1 - Project Maturity Analysis
              id: maturity-analysis
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                  GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Add the GitHub MCP Server
                  gemini mcp add github npx -y @modelcontextprotocol/server-github

                  PROMPT="You are a strict project maturity analyzer. Use your GitHub tools to analyze the repository issues. Determine the project's maturity level based on these rules:\n1. If there are >= 100 total issues AND all currently open issues are minor/unimportant, the project is ready for 1.0.0 ('MATURITY_1_0_0_READY').\n2. Otherwise, if adoption is growing but not quite stable, output 'MATURITY_BETA'.\n3. If it is very stable but hasn't reached the 100 issue mark, output 'MATURITY_STABLE'.\n4. If it's still early, output 'MATURITY_ALPHA'.\n\nCRITICAL: Do NOT use run_shell_command or the generalist agent. Use ONLY the mcp_github_* tools.\n\nYou MUST respond by wrapping exactly one of the enum values in <result> tags (e.g., <result>YOUR_ENUM_HERE</result>) and absolutely nothing else."

                  MATURITY_RESULT=$(gemini --prompt "$PROMPT" --approval-mode=auto_edit)

                  if echo "$MATURITY_RESULT" | grep -E -q "<result>(MATURITY_ALPHA|MATURITY_BETA|MATURITY_STABLE|MATURITY_1_0_0_READY)</result>"; then
                      MATCH=$(echo "$MATURITY_RESULT" | grep -E -o "<result>(MATURITY_ALPHA|MATURITY_BETA|MATURITY_STABLE|MATURITY_1_0_0_READY)</result>" | sed -e 's/<result>//' -e 's/<\/result>//' | tail -n 1)
                      echo "maturity_level=$MATCH" >> $GITHUB_OUTPUT
                  else
                      echo "Error: Invalid maturity result. Possible prompt injection or agent failure."
                      echo "Output: $MATURITY_RESULT"
                      exit 1
                  fi

            - name: Phase 2 - Execution & Versioning
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              run: |
                  LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  if [ -z "$LAST_TAG" ]; then
                    COMMITS=$(git log --oneline)
                  else
                    COMMITS=$(git log ${LAST_TAG}..HEAD --oneline)
                  fi

                  if [ -z "$COMMITS" ]; then
                    echo "No commits since last release. Exiting."
                    exit 0
                  fi

                  MATURITY_LEVEL="${{ steps.maturity-analysis.outputs.maturity_level }}"

                  PROMPT="Please act as the agent-w-maintainer. The project maturity has been securely determined as: $MATURITY_LEVEL. Here are the commits since the last release:\n$COMMITS\n\nBased on the semantic meaning of these commits AND the maturity level, decide the next version bump. If the maturity is MATURITY_1_0_0_READY and the current version is < 1.0.0, you must bump to 1.0.0. Otherwise, perform a standard patch/minor/major bump.\n\nApply the version bump to package.json. Then, update CHANGELOG.md. Finally, update the 'Project Status' section in README.md to accurately reflect the current maturity ($MATURITY_LEVEL). You are running in CI/CD and are pre-approved to modify these files. Do NOT commit the changes, the pipeline will handle the commit step. ${{ github.event.inputs.instructions }}"

                  gemini --prompt "$PROMPT" --approval-mode=yolo

            - name: Commit, Tag, and Push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  if git diff --quiet package.json; then
                    echo "No version change detected in package.json. Skipping publish."
                    exit 0
                  fi

                  NEW_VERSION=$(node -p "require('./package.json').version")
                  git add package.json CHANGELOG.md README.md
                  git commit -m "Release v$NEW_VERSION"
                  git tag "v$NEW_VERSION"
                  git push origin main --tags

            - name: Publish to NPM
              run: npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
