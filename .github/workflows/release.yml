name: AI Release and Publish

on:
    workflow_dispatch:
        inputs:
            instructions:
                description:
                    "Optional extra instructions for the AI release agent"
                required: false
                type: string

permissions:
    contents: write
    id-token: write
    issues: read

jobs:
    ai-release:
        runs-on: ubuntu-latest
        env:
            CI: "true"
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: "24.x"
                  registry-url: "https://registry.npmjs.org"

            - name: Install Gemini CLI
              run: npm install -g @google/gemini-cli

            - name: Phase 1 - Project Maturity Analysis
              id: maturity-analysis
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              run: |
                  # Fetch issues securely using gh cli
                  gh issue list --state all --json title,state,labels --limit 1000 > issues.json

                  cat << 'EOF' > analyze.cjs
                  const fs = require('fs');
                  const issues = JSON.parse(fs.readFileSync('issues.json', 'utf8'));
                  const prompt = `You are a strict project maturity analyzer. I will provide a JSON list of the repository's issues. Determine the project's maturity level based on these rules:
                  1. If there are >= 100 total issues AND all currently open issues are minor/unimportant, the project is ready for 1.0.0 ('MATURITY_1_0_0_READY').
                  2. Otherwise, if adoption is growing but not quite stable, output 'MATURITY_BETA'.
                  3. If it is very stable but hasn't reached the 100 issue mark, output 'MATURITY_STABLE'.
                  4. If it's still early, output 'MATURITY_ALPHA'.

                  You MUST respond by wrapping exactly one of the enum values in <result> tags (e.g., <result>MATURITY_ALPHA</result>) and absolutely nothing else.

                  Issues JSON:
                  ${JSON.stringify(issues)}`;

                  async function run() {
                      // Fetch available models
                      const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${process.env.GEMINI_API_KEY}`);
                      const modelsData = await modelsRes.json();
                      
                      if (!modelsData.models) {
                          console.error("Failed to fetch models");
                          process.exit(1);
                      }

                      // Find the latest flash model
                      const flashModels = modelsData.models
                          .filter(m => m.name.includes('flash') && m.supportedGenerationMethods.includes('generateContent') && !m.name.includes('vision') && !m.name.includes('lite') && !m.name.includes('audio') && !m.name.includes('image') && !m.name.includes('tts'))
                          .map(m => m.name.replace('models/', ''));
                          
                      flashModels.sort((a, b) => {
                          const matchA = a.match(/gemini-(\d+\.?\d*)/);
                          const matchB = b.match(/gemini-(\d+\.?\d*)/);
                          const verA = matchA ? parseFloat(matchA[1]) : 0;
                          const verB = matchB ? parseFloat(matchB[1]) : 0;
                          return verB - verA; // Descending order
                      });
                      
                      const latestModel = flashModels[0] || 'gemini-2.5-flash';
                      console.error("======================================");
                      console.error(`=> Auto-detected latest flash model: ${latestModel}`);
                      console.error("======================================");

                      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${latestModel}:generateContent?key=${process.env.GEMINI_API_KEY}`, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify({
                              contents: [{ parts: [{ text: prompt }] }]
                          })
                      });
                      const data = await res.json();
                      if (data.error) {
                          console.error("API Error:", data.error.message || JSON.stringify(data.error));
                          process.exit(1);
                      }
                      const text = data.candidates[0].content.parts[0].text;
                      console.error("======================================");
                      console.error("=> Raw LLM Output:");
                      console.error(text);
                      console.error("======================================");
                      console.log(text);
                  }
                  run();
                  EOF

                  MATURITY_RESULT=$(node analyze.cjs)
                  rm analyze.cjs issues.json

                  if echo "$MATURITY_RESULT" | grep -E -q "<result>(MATURITY_ALPHA|MATURITY_BETA|MATURITY_STABLE|MATURITY_1_0_0_READY)</result>"; then
                      MATCH=$(echo "$MATURITY_RESULT" | grep -E -o "<result>(MATURITY_ALPHA|MATURITY_BETA|MATURITY_STABLE|MATURITY_1_0_0_READY)</result>" | sed -e 's/<result>//' -e 's/<\/result>//' | tail -n 1)
                      echo "maturity_level=$MATCH" >> $GITHUB_OUTPUT
                  else
                      echo "Error: Invalid maturity result. Possible prompt injection or agent failure."
                      echo "Output: $MATURITY_RESULT"
                      exit 1
                  fi

            - name: Phase 2 - Execution & Versioning
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              run: |
                  LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  if [ -z "$LAST_TAG" ]; then
                    COMMITS=$(git log --oneline)
                  else
                    COMMITS=$(git log ${LAST_TAG}..HEAD --oneline)
                  fi

                  if [ -z "$COMMITS" ]; then
                    echo "No commits since last release. Exiting."
                    exit 0
                  fi

                  MATURITY_LEVEL="${{ steps.maturity-analysis.outputs.maturity_level }}"

                  PROMPT="Please act as the agent-w-maintainer. The project maturity has been securely determined as: $MATURITY_LEVEL. Here are the commits since the last release:\n$COMMITS\n\nBased on the semantic meaning of these commits AND the maturity level, decide the next version bump. If the maturity is MATURITY_1_0_0_READY and the current version is < 1.0.0, you must bump to 1.0.0. Otherwise, perform a standard patch/minor/major bump.\n\nApply the version bump to package.json. Then, update CHANGELOG.md. Next, update the 'Project Status' section in README.md to accurately reflect the current maturity ($MATURITY_LEVEL). Finally, create a file named 'release_notes.md' where the first line is the release name in the format v<Version> — <Title> (where <Title> is an engaging, short, and possibly humorous headline), followed by a blank line, and then the detailed release description (similar to what you put in the CHANGELOG). You are running in CI/CD and are pre-approved to modify these files. Do NOT commit the changes, the pipeline will handle the commit step. ${{ github.event.inputs.instructions }}"

                  gemini --prompt "$PROMPT" --approval-mode=yolo

            - name: Commit, Tag, and Push
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  if git diff --quiet package.json; then
                    echo "No version change detected in package.json. Skipping publish."
                    exit 0
                  fi

                  NEW_VERSION=$(node -p "require('./package.json').version")
                  git add package.json CHANGELOG.md README.md
                  git commit -m "Release v$NEW_VERSION"
                  git push origin main

                  # Create GitHub Release
                  if [ -f "release_notes.md" ]; then
                    RELEASE_TITLE=$(head -n 1 release_notes.md)
                    tail -n +3 release_notes.md > release_body.md
                    gh release create "v$NEW_VERSION" --target main -t "$RELEASE_TITLE" -F release_body.md
                  else
                    gh release create "v$NEW_VERSION" --target main -t "Release v$NEW_VERSION" --generate-notes
                  fi
                  rm -f release_notes.md release_body.md

            - name: Publish to NPM
              run: npm publish
